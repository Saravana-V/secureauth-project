<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}SecureAuth Shop{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
  <!-- Amazon-style Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary py-2">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">
        <span style="font-size:1.5rem;">&#128722; SecureShop</span>
      </a>
      <form class="d-flex mx-auto w-50" role="search">
        <input class="form-control me-2" type="search" placeholder="Search products..." aria-label="Search">
        <button class="btn btn-warning" type="submit">Search</button>
      </form>
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
        <li class="nav-item mx-2">
          <a class="nav-link text-white" href="#">Orders</a>
        </li>
        <li class="nav-item mx-2">
          {% if name %}
            <a class="nav-link text-white" href="#">Hello, {{ name }}</a>
          {% else %}
            <a class="nav-link text-white" href="{{ url_for('auth.login') }}">Sign In</a>
          {% endif %}
        </li>
        <li class="nav-item mx-2">
          <a class="nav-link text-white position-relative" href="{{ url_for('shop.cart') }}">
            <span style="font-size:1.3rem;">&#128722;</span>
            {% if session.cart %}
              <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark">{{ session.cart|length }}</span>
            {% else %}
              <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark">0</span>
            {% endif %}
          </a>
        </li>
      </ul>
    </div>
  </nav>
  <!-- Hero/banner section -->
  {% block hero %}{% endblock %}
  <!-- Main content -->
  <div class="container mt-4">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
