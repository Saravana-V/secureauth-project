<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Manage Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">SecureAuth</a>
    <div class="d-flex">
      <a class="btn btn-outline-light me-2" href="{{ url_for('auth.logout') }}">Logout</a>
      <a class="btn btn-outline-light" href="{{ url_for('auth.login') }}">Back to Login</a>
    </div>
  </div>
</nav>

<div class="container my-5">
  <h3>Add New Product</h3>
  <form method="POST" action="{{ url_for('shop.admin_products') }}">
    <div class="mb-3">
      <input name="name" class="form-control" placeholder="Product Name" required>
    </div>
    <div class="mb-3">
      <input name="price" type="number" class="form-control" placeholder="Price (₹)" required>
    </div>
    <div class="mb-3">
      <input name="description" class="form-control" placeholder="Description" required>
    </div>
    <div class="mb-3">
      <input name="image_url" class="form-control" placeholder="Image URL" required>
    </div>
    <button type="submit" class="btn btn-success">Add Product</button>
  </form>

  <hr class="my-5">

  <h4>All Products</h4>
  <table class="table table-bordered mt-3">
    <thead>
      <tr>
        <th>Name</th><th>Price</th><th>Description</th><th>Image</th><th>Action</th>
      </tr>
    </thead>
    <tbody>
      {% for product in products %}
      <tr>
        <td>{{ product.name }}</td>
        <td>₹{{ product.price }}</td>
        <td>{{ product.description }}</td>
        <td><img src="{{ product.image_url }}" width="80"></td>
        <td>
          <form method="POST" action="{{ url_for('shop.delete_product') }}">
            <input type="hidden" name="product_id" value="{{ product._id }}">
            <button class="btn btn-danger btn-sm" onclick="return confirm('Are you sure?')">Delete</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

</body>
</html>
